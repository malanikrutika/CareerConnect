<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerConnect - Contact</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>CareerConnect</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
            <a href="companies.html">Companies</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>

        <h2>Contact Placement Cell</h2>

        <!-- CONTACT FORM -->
        <form id="contactForm" onsubmit="return sendMessage()">

            <label>Name:</label>
            <input type="text" id="c_name" placeholder="Enter your name">

            <label>Email:</label>
            <input type="email" id="c_email" placeholder="Enter your email">

            <label>Subject:</label>
            <input type="text" id="c_subject" placeholder="Subject">

            <label>Message:</label>
            <textarea id="c_msg" rows="5" placeholder="Write your message"></textarea>

            <button type="submit">Send Message</button>

        </form>

    </main>

    <!-- JS FILE -->
    <script src="pro.js"></script>

</body>

</html>
