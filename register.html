<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerConnect - Register</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>CareerConnect</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
            <a href="companies.html">Companies</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>

        <h2>Student Registration Form</h2>

        <!-- IMPORTANT: onsubmit connects JS -->
        <form id="regForm" onsubmit="return validateForm()">

            <label>Full Name:</label>
            <input type="text" id="name" placeholder="Enter your name">

            <label>Roll Number:</label>
            <input type="text" id="roll" placeholder="Enter roll number">

            <label>Email:</label>
            <input type="email" id="email" placeholder="Enter email">

            <label>CGPA:</label>
            <input type="number" id="cgpa" step="0.01" placeholder="Enter CGPA">

            <label>Branch:</label>
            <select id="branch">
                <option>Computer Science</option>
                <option>IT</option>
                <option>Mechanical</option>
                <option>Electronics</option>
            </select>

            <br><br>

            <button type="submit">Register</button>

        </form>

    </main>

    <!-- IMPORTANT JS LINK -->
    <script src="pro.js"></script>

</body>

</html>
